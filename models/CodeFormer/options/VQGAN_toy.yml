name: VQGAN-512-ds32-nearest-stage1
model_type: VQGANModel
num_gpu: 0
manual_seed: 0
datasets:
  train:
    name: FFHQ
    type: FFHQBlindDataset
    dataroot_gt: datasets/ffhq/ffhq_512
    filename_tmpl: '{}'
    io_backend:
      type: disk
    in_size: 512
    gt_size: 512
    mean:
    - 0.5
    - 0.5
    - 0.5
    std:
    - 0.5
    - 0.5
    - 0.5
    use_hflip: true
    use_corrupt: false
    num_worker_per_gpu: 0
    batch_size_per_gpu: 1
    dataset_enlarge_ratio: 1
    prefetch_mode: cpu
    num_prefetch_queue: 4
network_g:
  type: VQAutoEncoder
  img_size: 512
  nf: 64
  ch_mult:
  - 1
  - 2
  - 2
  - 4
  - 4
  - 8
  quantizer: nearest
  codebook_size: 1024
network_d:
  type: VQGANDiscriminator
  nc: 3
  ndf: 64
path:
  pretrain_network_g: null
  param_key_g: params_ema
  strict_load_g: true
  pretrain_network_d: null
  strict_load_d: true
  resume_state: null
train:
  optim_g:
    type: Adam
    lr: 7.0e-05
    weight_decay: 0
    betas:
    - 0.9
    - 0.99
  optim_d:
    type: Adam
    lr: 7.0e-05
    weight_decay: 0
    betas:
    - 0.9
    - 0.99
  scheduler:
    type: CosineAnnealingRestartLR
    periods:
    - 1600000
    restart_weights:
    - 1
    eta_min: 6.0e-05
  total_iter: 5
  warmup_iter: -1
  ema_decay: 0.995
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  perceptual_opt:
    type: LPIPSLoss
    loss_weight: 1.0
    use_input_norm: true
    range_norm: true
  gan_opt:
    type: GANLoss
    gan_type: hinge
    loss_weight: 1.0
  net_g_start_iter: 0
  net_d_iters: 1
  net_d_start_iter: 30001
  manual_seed: 0
val:
  val_freq: 50000000000.0
  save_img: true
  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: false
logger:
  print_freq: 1
  save_checkpoint_freq: 5
  use_tb_logger: false
  wandb: null
dist_params: null
find_unused_parameters: true
dist: false
